name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ascii:
    name: ASCII Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check for non-ASCII characters
        run: |
          NON_ASCII=$(find . \
            \( -path './target' -o -path './.git' \) -prune -o \
            -type f \( -name '*.rs' -o -name '*.md' -o -name '*.toml' -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.sh' \) \
            -print0 \
            | LC_ALL=C xargs -0 -r grep -Pn '[^\x00-\x7F]' 2>/dev/null) || true

          if [ -n "$NON_ASCII" ]; then
            FOUND=0
            while IFS= read -r match; do
              file="${match%%:*}"
              rest="${match#*:}"
              line="${rest%%:*}"
              echo "::error file=${file},line=${line}::Non-ASCII character found"
              FOUND=1
            done <<< "$NON_ASCII"

            if [ "$FOUND" -eq 1 ]; then
              echo ""
              echo "Common offenders: smart quotes, em dashes, curly apostrophes, unicode symbols."
              echo "Replace them with ASCII equivalents."
              exit 1
            fi
          fi

          echo "All source files are ASCII-clean."

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo nextest run --workspace --profile ci
      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Test Results
          path: target/nextest/ci/junit.xml
          reporter: java-junit
